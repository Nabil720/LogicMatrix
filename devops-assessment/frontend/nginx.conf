server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check for the frontend container itself
    location /nginx-health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
